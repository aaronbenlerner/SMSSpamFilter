name: SMSSpamFilter
options:
  bundleIdPrefix: com.aaron
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""

targets:
  SMSSpamFilter:
    type: application
    platform: iOS
    sources:
      - path: SMSSpamFilter
        excludes:
          - "*.entitlements"
      - path: SMSSpamClassifier.json
        buildPhase: resources
    info:
      path: SMSSpamFilter/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: SMS Spam Filter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaron.SMSSpamFilter
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: SMSSpamFilter/SMSSpamFilter.entitlements
    dependencies:
      - target: MessageFilterExtension

  MessageFilterExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MessageFilterExtension/MessageFilterExtension.swift
      - path: SMSSpamClassifier.json
        buildPhase: resources
    info:
      path: MessageFilterExtension/Info-Extension.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.identitylookup.message-filter
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessageFilterExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aaron.SMSSpamFilter.MessageFilterExtension
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: MessageFilterExtension/MessageFilterExtension.entitlements
