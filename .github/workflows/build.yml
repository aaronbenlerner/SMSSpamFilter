name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$CERTIFICATE_P12_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Install provisioning profiles
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          EXTENSION_PROFILE_BASE64: ${{ secrets.EXTENSION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          echo -n "$EXTENSION_PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/extension.mobileprovision

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SMSSpamFilter.xcodeproj \
            -scheme SMSSpamFilter \
            -configuration Release \
            -archivePath build/SMSSpamFilter.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=9Y6XS38XC3 \
            -quiet

      - name: Create ExportOptions.plist
        run: |
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.aaron.SMSSpamFilter</key>
              <string>SMSSpamFilter_AdHoc</string>
              <key>com.aaron.SMSSpamFilter.MessageFilterExtension</key>
              <string>MessageFilterExt_AdHoc</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SMSSpamFilter.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist \
            -quiet

      - name: Deploy OTA install page
        run: |
          mkdir -p ota
          cp build/export/SMSSpamFilter.ipa ota/SMSSpamFilter.ipa

          cat > ota/manifest.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>https://aaronbenlerner.github.io/SMSSpamFilter/SMSSpamFilter.ipa</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>com.aaron.SMSSpamFilter</string>
                  <key>bundle-version</key>
                  <string>1.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>SMS Spam Filter</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

          cat > ota/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>SMS Spam Filter — Install</title>
            <style>
              body { font-family: -apple-system, system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; text-align: center; }
              .btn { display: inline-block; padding: 16px 32px; background: #007AFF; color: white; text-decoration: none; border-radius: 12px; font-size: 18px; font-weight: 600; margin: 20px 0; }
              .btn:active { background: #0056b3; }
              .note { color: #666; font-size: 14px; margin-top: 20px; }
            </style>
          </head>
          <body>
            <h1>SMS Spam Filter</h1>
            <p>On-device ML spam detection for iOS</p>
            <a class="btn" href="itms-services://?action=download-manifest&url=https://aaronbenlerner.github.io/SMSSpamFilter/manifest.plist">
              Install App
            </a>
            <p class="note">Open this page in Safari on your iPhone.<br>After installing, go to Settings → General → VPN & Device Management to trust the developer profile.</p>
          </body>
          </html>
          HTML

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ota

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMSSpamFilter
          path: build/export/SMSSpamFilter.ipa

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
